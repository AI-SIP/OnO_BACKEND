global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ono-backend-local"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  # 앱을 docker-compose.dev.yml(app-dev:8082)로 띄우는 경우 사용
  - job_name: "ono-backend-dev-port"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8082"]
