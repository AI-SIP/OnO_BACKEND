global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ono-backend-dev"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app-dev:8080"]

  - job_name: "ono-redis-dev"
    static_configs:
      - targets: ["ono-redis-exporter-dev:9121"]

  - job_name: "ono-rabbitmq-dev"
    static_configs:
      - targets: ["ono-rabbitmq-exporter-dev:9419"]
