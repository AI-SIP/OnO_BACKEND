name: Agent Config Lint

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".claude/**"
      - ".codex/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/agent-config-lint.yml"
      - ".gitignore"
  push:
    branches: ["main", "develop"]
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".claude/**"
      - ".codex/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/agent-config-lint.yml"
      - ".gitignore"

permissions:
  contents: read

jobs:
  agent-config-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run agent config lint
        run: bash .codex/scripts/agent-config-lint.sh
