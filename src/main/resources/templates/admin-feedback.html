<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnO 관리자 - 유저 피드백</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a th:href="@{/admin/main}">
            <h1 class="text-2xl font-bold text-indigo-600">OnO 관리자</h1>
          </a>
        </div>
        <div class="flex items-center space-x-4 overflow-x-auto">
          <a th:href="@{/admin/main}" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium whitespace-nowrap">대시보드</a>
          <a th:href="@{/admin/users}" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium whitespace-nowrap">유저</a>
          <a th:href="@{/admin/problems}" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium whitespace-nowrap">문제</a>
          <a th:href="@{/admin/analysis}" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium whitespace-nowrap">통계</a>
          <a th:href="@{/admin/feedbacks}" class="text-indigo-600 px-3 py-2 rounded-md text-sm font-medium border-b-2 border-indigo-600 whitespace-nowrap">피드백</a>
          <form th:action="@{/logout}" method="post">
            <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm font-medium transition whitespace-nowrap">로그아웃</button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-900">유저 피드백</h2>
      <p class="text-gray-600 mt-1">총 <span class="font-semibold text-indigo-600" th:text="${totalCount}">0</span>건의 응답</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center gap-4">
        <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm text-gray-500">총 응답 수</p>
          <p class="text-2xl font-bold text-gray-900" th:text="${totalCount}">0</p>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center gap-4">
        <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm text-gray-500">평균 NPS</p>
          <p class="text-2xl font-bold text-gray-900">
            <span th:if="${averageNps != null}" th:text="${#numbers.formatDecimal(averageNps, 1, 1)}">-</span>
            <span th:if="${averageNps == null}" class="text-gray-400 text-base">응답 없음</span>
            <span th:if="${averageNps != null}" class="text-sm font-normal text-gray-500"> / 10</span>
          </p>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">제출일시</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">사용 목적</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">빈도</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">NPS</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">자주 쓰는 기능</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"></th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-100">
            <tr th:each="f : ${feedbacks}" class="hover:bg-gray-50 transition-colors">
              <td class="px-4 py-3 text-sm text-gray-900 font-mono" th:text="${f.id}">1</td>
              <td class="px-4 py-3 text-sm text-gray-600 whitespace-nowrap"
                  th:text="${f.submittedAt != null ? #temporals.format(f.submittedAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
              <td class="px-4 py-3 text-sm text-gray-800 max-w-[160px] truncate" th:text="${f.usagePurpose ?: '-'}">-</td>
              <td class="px-4 py-3 text-sm text-gray-800 whitespace-nowrap" th:text="${f.usageFrequency ?: '-'}">-</td>
              <td class="px-4 py-3 text-sm font-semibold">
                <span th:if="${f.npsScore != null}"
                      th:class="${f.npsScore >= 9 ? 'text-green-600' : (f.npsScore >= 7 ? 'text-yellow-600' : 'text-red-500')}"
                      th:text="${f.npsScore}">-</span>
                <span th:if="${f.npsScore == null}" class="text-gray-400">-</span>
              </td>
              <td class="px-4 py-3 text-sm text-gray-800 whitespace-nowrap" th:text="${f.mostUsedFeature ?: '-'}">-</td>
              <td class="px-4 py-3 text-right">
                <a th:href="@{/admin/feedbacks/{id}(id=${f.id})}"
                   class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">상세 보기</a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(feedbacks)}">
              <td colspan="7" class="px-4 py-12 text-center text-gray-400">아직 피드백이 없습니다</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="mt-6 flex items-center justify-between flex-wrap gap-4">
      <div class="text-sm text-gray-600">
        페이지 <span class="font-semibold" th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
      </div>
      <div class="flex flex-wrap gap-2">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/feedbacks(page=${currentPage - 1}, size=${size})}"
           class="px-4 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">이전</a>
        <span th:if="${currentPage == 0}"
              class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md text-sm font-medium text-gray-400 cursor-not-allowed">이전</span>

        <a th:if="${hasPreviousBlock}"
           th:href="@{/admin/feedbacks(page=${pageBlockStart - 10}, size=${size})}"
           class="px-3 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">&lt;&lt;</a>

        <th:block th:each="p : ${#numbers.sequence(pageBlockStart, pageBlockEnd)}">
          <a th:if="${p == currentPage}"
             class="px-4 py-2 bg-indigo-600 border border-indigo-600 rounded-md text-sm font-medium text-white">
            <span th:text="${p + 1}">1</span>
          </a>
          <a th:if="${p != currentPage}"
             th:href="@{/admin/feedbacks(page=${p}, size=${size})}"
             class="px-4 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
            <span th:text="${p + 1}">1</span>
          </a>
        </th:block>

        <a th:if="${hasNextBlock}"
           th:href="@{/admin/feedbacks(page=${pageBlockStart + 10}, size=${size})}"
           class="px-3 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">&gt;&gt;</a>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/feedbacks(page=${currentPage + 1}, size=${size})}"
           class="px-4 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">다음</a>
        <span th:if="${currentPage >= totalPages - 1}"
              class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md text-sm font-medium text-gray-400 cursor-not-allowed">다음</span>
      </div>
    </div>
  </div>
</body>
</html>
