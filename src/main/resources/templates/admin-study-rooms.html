<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스터디룸 관리 — OnO Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a th:href="@{/admin/main}" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <h1 class="text-xl font-bold text-gray-900">스터디룸 관리</h1>
      </div>
      <span class="text-sm text-gray-500">전체 <strong th:text="${totalCount}">0</strong> 개</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">룸 이름</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">멤버 수</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">공유 문제 수</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">생성일</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">상세</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr th:each="room : ${rooms}" class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${room.id}"></td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${room.name}"></td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
              <span class="inline-flex items-center gap-1">
                <svg class="w-4 h-4 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span th:text="${room.memberCount}"></span>명
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" th:text="${room.sharedProblemCount} + '개'"></td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"
                th:text="${#temporals.format(room.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td class="px-6 py-4 whitespace-nowrap text-sm">
              <a th:href="@{/admin/study-rooms/{id}(id=${room.id})}"
                 class="text-teal-600 hover:text-teal-900 font-medium">상세 보기 →</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(rooms)}">
            <td colspan="6" class="px-6 py-12 text-center text-gray-400 text-sm">스터디룸이 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="mt-6 flex items-center justify-center gap-1">
      <a th:if="${hasPreviousBlock}"
         th:href="@{/admin/study-rooms(page=${pageBlockStart - 1}, size=${size})}"
         class="px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-200 transition-colors">«</a>

      <th:block th:each="i : ${#numbers.sequence(pageBlockStart, pageBlockEnd)}">
        <a th:href="@{/admin/study-rooms(page=${i}, size=${size})}"
           th:text="${i + 1}"
           th:classappend="${i == currentPage} ? 'bg-teal-500 text-white' : 'text-gray-600 hover:bg-gray-200'"
           class="px-3 py-2 rounded text-sm transition-colors"></a>
      </th:block>

      <a th:if="${hasNextBlock}"
         th:href="@{/admin/study-rooms(page=${pageBlockEnd + 1}, size=${size})}"
         class="px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-200 transition-colors">»</a>
    </div>

  </main>
</body>
</html>
