<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피드백 제출 완료 — OnO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #1cba1a; --brand-dk: #0f9a0d; --brand-light: #dcfce7; --t1: #1d1d1f; --t2: #6e6e73; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans KR", -apple-system, sans-serif;
      background: #f9fafb;
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div style="text-align:center; max-width:360px; width:100%;">
    <div style="width:80px; height:80px; background:var(--brand-light); border-radius:9999px;
                display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
      <svg width="40" height="40" fill="none" stroke="var(--brand)" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 style="font-size:1.6rem; font-weight:700; color:var(--t1); margin-bottom:12px;">감사합니다!</h1>
    <p style="font-size:.9rem; color:var(--t2); line-height:1.7;">
      소중한 피드백을 보내주셨습니다.<br>
      더 나은 OnO를 만드는 데 큰 도움이 됩니다.
    </p>
  </div>
</body>
</html>
